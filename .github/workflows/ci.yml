name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: moon test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.moon/lib"
          curl -fsSL https://cli.moonbitlang.com/binaries/latest/moonbit-linux-x86_64.tar.gz -o /tmp/moonbit.tar.gz
          tar xf /tmp/moonbit.tar.gz --directory="$HOME/.moon"
          curl -fsSL https://cli.moonbitlang.com/cores/core-latest.tar.gz -o /tmp/core.tar.gz
          tar xf /tmp/core.tar.gz --directory="$HOME/.moon/lib"
          chmod +x "$HOME/.moon/bin/"*
          chmod +x "$HOME/.moon/bin/internal/tcc"
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Bundle core
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.moon/bin:$PATH"
          cd "$HOME/.moon/lib/core"
          moon bundle --warn-list -a --all
          moon bundle --warn-list -a --target wasm-gc --quiet

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          moon test
